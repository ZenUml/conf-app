name: 'Build and publish using wrangler'
description: 'Build the application with functions and publish it to cloudflare pages.'

inputs:
  node-version:
    description: 'The node version'
    required: true
  cloudflare-api-token:
    description: 'Cloudflare API Token'
    required: true
  cloudflare-account-id:
    description: 'Cloudflare account ID'
    required: true
  license:
    description: 'Full or Lite'
    required: true
  project:
    description: 'Project name of cloudflare pages'
    required: true
runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'pnpm'
    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      shell: bash
      with:
        version: 9.x
    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile --ignore-scripts
      env:
        NODE_OPTIONS: "--max-old-space-size=8192"
    - name: pnpm build
      shell: bash
      env:
        NODE_OPTIONS: "--max-old-space-size=8192"
      run: pnpm build:${{ inputs.license }}
    - name: Publish
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ inputs.cloudflare-api-token }}
        accountId: ${{ inputs.cloudflare-account-id }}
        command: pages deploy dist --branch production --project-name=${{ inputs.project }}
