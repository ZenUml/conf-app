name: 'Build and publish using wrangler'
description: 'Build the application with functions and publish it to cloudflare pages.'

inputs:
  node-version:
    description: 'The node version'
    required: true
  cloudflare-api-token:
    description: 'Cloudflare API Token'
    required: true
  cloudflare-account-id:
    description: 'Cloudflare account ID'
    required: true
  license:
    description: 'Full, Lite, or Diagramly'
    required: true
  project:
    description: 'Project name of cloudflare pages'
    required: true
  environment:
    description: 'Environment (stg or prod)'
    required: true
    default: 'stg'
  vite-mixpanel-token:
    description: 'Mixpanel token (baked into the JS bundle and synced to Cloudflare Pages as MIXPANEL_TOKEN)'
    required: true
  vite-app-version:
    description: 'App version baked into the JS bundle as VITE_APP_VERSION'
    required: false
    default: ''
  sentry-dsn:
    description: 'Sentry DSN synced to Cloudflare Pages as SENTRY_DSN'
    required: true
  page-capture-secret:
    description: 'Shared secret for forge-page-capture endpoint (PAGE_CAPTURE_SECRET). If empty, the secret is not updated on Cloudflare Pages.'
    required: false
    default: ''
  page-capture-allowed-domains:
    description: 'Comma-separated Atlassian subdomain prefixes to capture (PAGE_CAPTURE_ALLOWED_DOMAINS). If empty, the value is not updated on Cloudflare Pages.'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v5
      with:
        version: 10.x
    - uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'pnpm'
    - name: Install dependencies
      run: pnpm install --frozen-lockfile --ignore-scripts
      shell: bash
      env:
        NODE_OPTIONS: "--max-old-space-size=8192"
    - name: pnpm build
      run: pnpm build:${{ inputs.license }}
      shell: bash
      env:
        NODE_OPTIONS: "--max-old-space-size=8192"
        VITE_MIXPANEL_TOKEN: ${{ inputs.vite-mixpanel-token }}
        VITE_APP_VERSION: ${{ inputs.vite-app-version }}
    - name: Sync runtime env vars to Cloudflare Pages
      run: |
        printf '%s' "$VITE_MIXPANEL_TOKEN" | npx wrangler pages secret put MIXPANEL_TOKEN --project-name=${{ inputs.project }}
        printf '%s' "$SENTRY_DSN" | npx wrangler pages secret put SENTRY_DSN --project-name=${{ inputs.project }}
        if [ -n "$PAGE_CAPTURE_SECRET" ]; then
          printf '%s' "$PAGE_CAPTURE_SECRET" | npx wrangler pages secret put PAGE_CAPTURE_SECRET --project-name=${{ inputs.project }}
        fi
        # PAGE_CAPTURE_ALLOWED_DOMAINS is a plain (non-secret) Pages var — injected into
        # wrangler.toml [vars] in the "Prepare wrangler config" step below.
        # Delete any pre-existing secret with the same name so the plain var isn't shadowed.
        echo y | npx wrangler pages secret delete PAGE_CAPTURE_ALLOWED_DOMAINS --project-name=${{ inputs.project }} 2>/dev/null || true
      shell: bash
      env:
        CLOUDFLARE_API_TOKEN: ${{ inputs.cloudflare-api-token }}
        CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare-account-id }}
        VITE_MIXPANEL_TOKEN: ${{ inputs.vite-mixpanel-token }}
        SENTRY_DSN: ${{ inputs.sentry-dsn }}
        PAGE_CAPTURE_SECRET: ${{ inputs.page-capture-secret }}
        PAGE_CAPTURE_ALLOWED_DOMAINS: ${{ inputs.page-capture-allowed-domains }}
    - name: Prepare wrangler config
      run: |
        # Select the appropriate config file based on environment
        CONFIG_FILE="wrangler-${{ inputs.environment }}.toml"
        
        # Check if the config file exists
        if [ ! -f "$CONFIG_FILE" ]; then
          echo "Error: Configuration file $CONFIG_FILE not found!"
          exit 1
        fi
        
        # Create wrangler.toml with the project name replaced
        sed "s/name=\"conf-${{ inputs.environment }}\"/name=\"${{ inputs.project }}\"/" "$CONFIG_FILE" > wrangler.toml

        # Inject PAGE_CAPTURE_ALLOWED_DOMAINS into [vars] and [env.production.vars] sections as a plain var.
        # Sourced from GitHub Actions vars (PAGE_CAPTURE_ALLOWED_DOMAINS_STG / _PROD) so the
        # tenant allowlist can be updated without a source PR.
        if [ -n "$PAGE_CAPTURE_ALLOWED_DOMAINS" ]; then
          sed -i "/^\[vars\]$/a PAGE_CAPTURE_ALLOWED_DOMAINS = \"$PAGE_CAPTURE_ALLOWED_DOMAINS\"" wrangler.toml
          sed -i "/^\[env\.production\.vars\]$/a PAGE_CAPTURE_ALLOWED_DOMAINS = \"$PAGE_CAPTURE_ALLOWED_DOMAINS\"" wrangler.toml
        fi
        cat wrangler.toml
      shell: bash
      env:
        PAGE_CAPTURE_ALLOWED_DOMAINS: ${{ inputs.page-capture-allowed-domains }}
    - name: Run D1 Migrations
      run: pnpm exec wrangler d1 migrations apply DB --remote --env production
      shell: bash
      env:
        CLOUDFLARE_API_TOKEN: ${{ inputs.cloudflare-api-token }}
        CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare-account-id }}
    - name: Publish
      run: pnpm exec wrangler pages deploy dist --branch production --project-name=${{ inputs.project }}
      shell: bash
      env:
        CLOUDFLARE_API_TOKEN: ${{ inputs.cloudflare-api-token }}
        CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare-account-id }}
    - name: Cleanup
      if: always()
      run: rm -f wrangler.toml
      shell: bash
