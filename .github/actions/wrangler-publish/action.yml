name: 'Build and publish using wrangler'
description: 'Build the application with functions and publish it to cloudflare pages.'

inputs:
  node-version:
    description: 'The node version'
    required: true
  cloudflare-api-token:
    description: 'Cloudflare API Token'
    required: true
  cloudflare-account-id:
    description: 'Cloudflare account ID'
    required: true
  license:
    description: 'Full or Lite'
    required: true
  project:
    description: 'Project name of cloudflare pages'
    required: true
runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v4
    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9.x
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'pnpm'
    - name: Install dependencies
      run: pnpm install --frozen-lockfile --ignore-scripts
      shell: bash
      env:
        NODE_OPTIONS: "--max-old-space-size=8192"
    - name: pnpm build
      run: pnpm build:${{ inputs.license }}
      shell: bash
      env:
        NODE_OPTIONS: "--max-old-space-size=8192"
    - name: Prepare wrangler config
      run: |
        # Create wrangler.toml with the project name replaced
        sed "s/name=\"conf-stg\"/name=\"${{ inputs.project }}\"/" wrangler-stg.toml > wrangler.toml
        cat wrangler.toml
      shell: bash
    - name: Run D1 Migrations
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ inputs.cloudflare-api-token }}
        accountId: ${{ inputs.cloudflare-account-id }}
        command: d1 migrations apply DB --env production
    - name: Publish
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ inputs.cloudflare-api-token }}
        accountId: ${{ inputs.cloudflare-account-id }}
        command: pages deploy dist --branch production --project-name=${{ inputs.project }}
    - name: Cleanup
      if: always()
      run: rm -f wrangler.toml
      shell: bash
