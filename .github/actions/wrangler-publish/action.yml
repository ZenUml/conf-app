name: 'Build and publish using wrangler'
description: 'Build the application with functions and publish it to cloudflare pages.'

inputs:
  node-version:
    description: 'The node version'
    required: true
  cloudflare-api-token:
    description: 'Cloudflare API Token'
    required: true
  cloudflare-account-id:
    description: 'Cloudflare account ID'
    required: true
  license:
    description: 'Full or Lite'
    required: true
  project:
    description: 'Project name of cloudflare pages'
    required: true
runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'yarn'
    - name: yarn install
      shell: bash
      run: yarn install
    - name: yarn build
      shell: bash
      env:
        NODE_OPTIONS: "--max-old-space-size=8192"
      run: yarn build:${{ inputs.license }}
    - name: Install Wrangler
      shell: bash
      run: npm install -g wrangler
    - name: Publish
      shell: bash
      env:
        CLOUDFLARE_API_TOKEN: ${{ inputs.cloudflare-api-token }}
        CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare-account-id }}
        CONFIG_FILE: wrangler.toml
      run: |
        temp_file=$(mktemp)
        echo "name=\"${{ inputs.project }}\"" > "$temp_file"
        cat "$CONFIG_FILE" >> "$temp_file"
        mv "$temp_file" "$CONFIG_FILE"
        wrangler pages deploy dist --branch production --project-name=${{ inputs.project }}
