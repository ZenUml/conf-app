name: Build and Deploy Forge(Yanhui)

on:
  push:
    tags-ignore:
      - '**' # do not run on tags
    branches:
      - 'forge'

jobs:
  build:
    name: Build, Deploy
    runs-on: ubuntu-latest
    env:
      FORGE_EMAIL: "${{ vars.FORGE_EMAIL_YANHUI }}"
      FORGE_API_TOKEN: "${{ secrets.FORGE_API_TOKEN_YANHUI }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.x
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: Install dependencies (skip post-install scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
      - run: pnpm build:lite
      - run: rm -rf dist/drawio
      - run: pnpm forge:deploy:enable-analytics
      - run: pnpm forge:deploy:lite:yanhui
      - run: pnpm forge:install:lite:yanhui
  
  