name: Build, Test and Draft Release

on:
  push:
    tags-ignore:
      - '**' # do not run on tags
    branches:
      - '**'

jobs:
  build:
    name: Build and Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.x
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: Install dependencies (skip post-install scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
      - run: pnpm test:unit
  
  staging-lite:
    needs: build
    name: L/Push(CF)&Install(Conf)
    environment:
      name: staging-lite
    runs-on: ubuntu-latest
    env:
      FORGE_EMAIL: "${{ vars.FORGE_EMAIL }}"
      FORGE_API_TOKEN: "${{ secrets.FORGE_API_TOKEN }}"
    steps:
      - uses: actions/checkout@v4
      - name: Build and publish
        uses: ./.github/actions/wrangler-publish
        with:
          node-version: '20.x'
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          license: lite
          project: conf-stg-lite
          environment: stg
      - run: rm -rf dist/drawio
      - run: pnpm forge:deploy:enable-analytics
      - run: pnpm forge:deploy:lite:staging
      - run: pnpm forge:install:lite:staging
        continue-on-error: true
      - run: pnpm forge:upgrade:lite:staging
        continue-on-error: true

  staging-lite-test:
    needs: staging-lite
    name: Lite - E2E Test on Staging
    environment:
      name: staging-lite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.x
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'
      # Install main dependencies without Puppeteer
      - name: Install main dependencies (skip post-install scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
      # Install E2E test dependencies separately
      - name: Install E2E test dependencies
        run: cd tests/e2e-tests && pnpm install
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
      # Cache Playwright browsers
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('tests/e2e-tests/pnpm-lock.yaml') }}
      # Install Playwright browsers
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd tests/e2e-tests && pnpm exec playwright install --with-deps chromium
      # Run E2E tests
      - name: Run E2E tests
        run: cd tests/e2e-tests && pnpm test
        env:
          CI: true
          IS_LITE: true
          NODE_OPTIONS: "--max-old-space-size=8192"
          ZENUML_STAGE_USERNAME: ${{ vars.ZENUML_STAGE_USERNAME }}
          ZENUML_STAGE_PASSWORD: ${{ vars.ZENUML_STAGE_PASSWORD }}
          ATLASSIAN_OTP: ${{ vars.ATLASSIAN_OTP }}
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-lite
          path: ./tests/e2e-tests/playwright-report/
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-lite
          path: ./tests/e2e-tests/screenshots/

  staging-full:
    needs: build
    name: F/Push(CF)&Install(Conf)
    environment:
      name: staging-full
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and publish
        uses: ./.github/actions/wrangler-publish
        with:
          node-version: '20.x'
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          license: full
          project: conf-stg-full
          environment: stg
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install PyYAML
        run: pip3 install PyYAML==5.3.1
      - name: Install pluploader
        run: pip3 install pluploader
      - name: Install plugin to Confluence
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            pluploader --base-url https://zenuml-stg.atlassian.net/wiki \
              --user ${{ secrets.ZENUML_STAGE_UPM_USER }} \
              --password ${{ secrets.ZENUML_STAGE_UPM_PASSWORD }} \
              install --cloud \
              --plugin-uri https://conf-stg-full.zenuml.com/descriptor

  staging-full-test:
    needs: staging-full
    name: Full - E2E Test on Staging
    environment:
      name: staging-full
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.x
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'
      # Install main dependencies without Puppeteer
      - name: Install main dependencies (skip post-install scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
      # Install E2E test dependencies separately
      - name: Install E2E test dependencies
        run: cd tests/e2e-tests && pnpm install
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
      # Cache Playwright browsers
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('tests/e2e-tests/pnpm-lock.yaml') }}
      # Install Playwright browsers
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd tests/e2e-tests && pnpm exec playwright install --with-deps chromium
      # Run E2E tests
      - name: Run E2E tests
        run: cd tests/e2e-tests && pnpm test
        env:
          CI: true
          NODE_OPTIONS: "--max-old-space-size=8192"
          ZENUML_STAGE_USERNAME: ${{ vars.ZENUML_STAGE_USERNAME }}
          ZENUML_STAGE_PASSWORD: ${{ vars.ZENUML_STAGE_PASSWORD }}
          ATLASSIAN_OTP: ${{ vars.ATLASSIAN_OTP }}
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-full
          path: ./tests/e2e-tests/playwright-report/
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-full
          path: ./tests/e2e-tests/screenshots/

  draft-release-lite:
    name: Draft release for the Lite version
    # don't run on pull requests to avoid creating draft releases for pull requests
    # only run on the master branch, to avoid cutting releases from feature branches
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/master' }}
    needs: [staging-lite-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
    steps:
      # Check out current repository
      - name: Fetch Sources
        uses: actions/checkout@v4
        with:
          submodules: true   # not used yet, but soon

      - name: Export Properties
        id: properties
        shell: bash
        run: |
          VERSION="$(echo $(date +'%Y.%m.%d%H%M'))"
          echo "version=$VERSION" >> $GITHUB_ENV

      # Create new release draft - which is not publicly visible and requires manual acceptance
      - name: Create Release Draft
        id: createDraft
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: v${{ env.version }}-lite
          name: v${{ env.version }}-lite
          body: 'This is a draft release for the Lite version of the plugin.'
          draft: true

  draft-release-full:
    name: Draft release for the Full version
    # don't run on pull requests to avoid creating draft releases for pull requests
    # only run on the master branch, to avoid cutting releases from feature branches
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/master' }}
    needs: [staging-full-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
    steps:
      # Check out current repository
      - name: Fetch Sources
        uses: actions/checkout@v4
        with:
          submodules: true   # not used yet, but soon

      - name: Export Properties
        id: properties
        shell: bash
        run: |
          VERSION="$(echo $(date +'%Y.%m.%d%H%M'))"
          echo "version=$VERSION" >> $GITHUB_ENV

      # Create new release draft - which is not publicly visible and requires manual acceptance
      - name: Create Release Draft
        id: createDraft
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: v${{ env.version }}-full
          name: v${{ env.version }}-full
          body: 'This is a draft release for the Full version of the plugin.'
          draft: true
