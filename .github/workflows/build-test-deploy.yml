name: Build, Test and Draft Release

on:
  push:
    tags-ignore:
      - '**' # do not run on tags
    branches:
      - '**'

jobs:
  build:
    name: Build and Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.x
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - name: Install dependencies (skip post-install scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
      - run: pnpm test:unit
  
  staging-lite:
    name: Lite / Deploy
    uses: ./.github/workflows/staging-deploy.yml
    with:
      variant: lite
      license: lite
      project: conf-stg-lite
      environment: staging-lite
    secrets: inherit

  staging-lite-test:
    needs: [staging-lite, build]
    name: Lite - E2E Test on Staging
    uses: ./.github/workflows/e2e-test.yml
    with:
      app: zenuml-lite@stg
      artifact-suffix: lite-stg
    secrets:
      username: ${{ vars.ZENUML_STAGE_USERNAME }}
      password: ${{ vars.ZENUML_STAGE_PASSWORD }}
      otp: ${{ vars.ATLASSIAN_OTP }}

  staging-full:
    name: Full / Deploy
    uses: ./.github/workflows/staging-deploy.yml
    with:
      variant: full
      license: full
      project: conf-stg-full
      environment: staging-full
    secrets: inherit

  staging-full-test:
    needs: [staging-full, build]
    name: Full - E2E Test on Staging
    uses: ./.github/workflows/e2e-test.yml
    with:
      app: zenuml-full@stg
      artifact-suffix: full-stg
    secrets:
      username: ${{ vars.ZENUML_STAGE_USERNAME }}
      password: ${{ vars.ZENUML_STAGE_PASSWORD }}
      otp: ${{ vars.ATLASSIAN_OTP }}

  staging-full-forge:
    name: Full Forge / Deploy
    uses: ./.github/workflows/staging-deploy.yml
    with:
      variant: full-forge
      license: full
      project: conf-stg-full
      environment: staging-full-forge
    secrets: inherit

  staging-full-forge-test:
    needs: [staging-full-forge, build]
    name: Full Forge - E2E Test on Staging
    uses: ./.github/workflows/e2e-test.yml
    with:
      app: zenuml-full-forge@stg
      artifact-suffix: full-forge-stg
    secrets:
      username: ${{ vars.ZENUML_STAGE_USERNAME }}
      password: ${{ vars.ZENUML_STAGE_PASSWORD }}
      otp: ${{ vars.ATLASSIAN_OTP }}

  staging-diagramly:
    name: Diagramly / Deploy
    uses: ./.github/workflows/staging-deploy.yml
    with:
      variant: diagramly
      license: diagramly
      project: conf-stg-lite
      environment: staging-diagramly
    secrets: inherit

  staging-diagramly-test:
    needs: [staging-diagramly, build]
    name: Diagramly - E2E Test on Staging
    uses: ./.github/workflows/e2e-test.yml
    with:
      app: diagramly@stg
      artifact-suffix: diagramly-stg
    secrets:
      username: ${{ vars.ZENUML_STAGE_USERNAME }}
      password: ${{ vars.ZENUML_STAGE_PASSWORD }}
      otp: ${{ vars.ATLASSIAN_OTP }}

  draft-release-lite:
    name: Draft release for the Lite version
    # don't run on pull requests to avoid creating draft releases for pull requests
    # only run on the master branch, to avoid cutting releases from feature branches
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/master' }}
    needs: [staging-lite-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
    steps:
      # Check out current repository
      - name: Fetch Sources
        uses: actions/checkout@v4

      - name: Export Properties
        id: properties
        shell: bash
        run: |
          VERSION="$(echo $(date +'%Y.%m.%d%H%M'))"
          echo "version=$VERSION" >> $GITHUB_ENV

      # Create new release draft - which is not publicly visible and requires manual acceptance
      - name: Create Release Draft
        id: createDraft
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: v${{ env.version }}-lite
          name: v${{ env.version }}-lite
          body: 'This is a draft release for the Lite version of the plugin.'
          draft: true

  draft-release-full:
    name: Draft release for the Full version
    # don't run on pull requests to avoid creating draft releases for pull requests
    # only run on the master branch, to avoid cutting releases from feature branches
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/master' }}
    needs: [staging-full-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
    steps:
      # Check out current repository
      - name: Fetch Sources
        uses: actions/checkout@v4

      - name: Export Properties
        id: properties
        shell: bash
        run: |
          VERSION="$(echo $(date +'%Y.%m.%d%H%M'))"
          echo "version=$VERSION" >> $GITHUB_ENV

      # Create new release draft - which is not publicly visible and requires manual acceptance
      - name: Create Release Draft
        id: createDraft
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: v${{ env.version }}-full
          name: v${{ env.version }}-full
          body: 'This is a draft release for the Full version of the plugin.'
          draft: true

  draft-release-full-forge:
    name: Draft release for the Full Forge version
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/master' }}
    needs: [staging-full-forge-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
    steps:
      - name: Fetch Sources
        uses: actions/checkout@v4

      - name: Export Properties
        id: properties
        shell: bash
        run: |
          VERSION="$(echo $(date +'%Y.%m.%d%H%M'))"
          echo "version=$VERSION" >> $GITHUB_ENV

      - name: Create Release Draft
        id: createDraft
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: v${{ env.version }}-full-forge
          name: v${{ env.version }}-full-forge
          body: 'This is a draft release for the Full Forge version of the plugin.'
          draft: true

  draft-release-diagramly:
    name: Draft release for the Diagramly version
    # don't run on pull requests to avoid creating draft releases for pull requests
    # only run on the master branch, to avoid cutting releases from feature branches
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/master' }}
    needs: [staging-diagramly-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
    steps:
      # Check out current repository
      - name: Fetch Sources
        uses: actions/checkout@v4

      - name: Export Properties
        id: properties
        shell: bash
        run: |
          VERSION="$(echo $(date +'%Y.%m.%d%H%M'))"
          echo "version=$VERSION" >> $GITHUB_ENV

      # Create new release draft - which is not publicly visible and requires manual acceptance
      - name: Create Release Draft
        id: createDraft
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: v${{ env.version }}-diagramly
          name: v${{ env.version }}-diagramly
          body: 'This is a draft release for the Diagramly version of the plugin.'
          draft: true
