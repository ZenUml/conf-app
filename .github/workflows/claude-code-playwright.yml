name: Claude Code with Playwright

on:
  workflow_dispatch:
    inputs:
      markdown_test_file:
        description: 'Markdown test file path (e.g., tests/e2e-tests/markdown/login-authentication.md)'
        required: false
        default: 'tests/e2e-tests/markdown/login-authentication.md'
        type: string
      model:
        description: 'Claude model to use'
        required: false
        default: 'claude-haiku-4-5-20251001'
        type: string
  push:
    branches:
      - feat/cc-in-actions
      - feature/claude-code-playwright
  pull_request:
    branches:
      - master

jobs:
  claude-playwright:
    name: Run Claude Code with Playwright
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      # Install Claude Code CLI
      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          echo "Claude Code version:"
          claude --version

      # Install Playwright browsers
      - name: Install Playwright browsers
        run: |
          npx playwright install chromium
          npx playwright install-deps chromium

      # Create MCP configuration for Playwright
      - name: Create MCP Configuration
        run: |
          mkdir -p ~/.config/claude
          cat > ~/.config/claude/config.json << 'EOF'
          {
            "mcpServers": {
              "playwright": {
                "command": "npx",
                "args": [
                  "@playwright/mcp@latest",
                  "--browser", "chromium",
                  "--headless"
                ]
              }
            }
          }
          EOF
          echo "MCP configuration created"
          cat ~/.config/claude/config.json

      # Create output directory
      - name: Create output directory
        run: |
          mkdir -p claude-output
          echo "Created output directory for results"

      # Run Claude Code with Playwright
      - name: Execute Markdown Test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ZENUML_DOMAIN: ${{ secrets.ZENUML_DOMAIN }}
          ZENUML_SPACE: ${{ secrets.ZENUML_SPACE }}
        run: |
          cd claude-output

          MARKDOWN_FILE="${{ github.event.inputs.markdown_test_file }}"
          if [ -z "$MARKDOWN_FILE" ]; then
            MARKDOWN_FILE="tests/e2e-tests/markdown/login-authentication.md"
          fi

          echo "Running test: $MARKDOWN_FILE"

          MODEL="${{ github.event.inputs.model }}"
          if [ -z "$MODEL" ]; then
            MODEL="claude-haiku-4-5-20251001"
          fi

          # Run the markdown file with Claude Code
          claude --debug -p --model "$MODEL" --dangerously-skip-permissions "$(cat ../$MARKDOWN_FILE)"

          echo "Output files:"
          ls -la

      # Upload all output as artifacts
      - name: Upload Output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-output
          path: claude-output/
          if-no-files-found: ignore

      # Display completion message
      - name: Workflow Complete
        run: |
          echo "✅ Claude Code with Playwright workflow completed"
          echo "Check the artifacts for any output files"