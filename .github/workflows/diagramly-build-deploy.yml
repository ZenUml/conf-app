name: Diagramly Build and Deploy

on:
  push:
    tags-ignore:
      - '**' # do not run on tags
    branches:
      - '**'

jobs:
  build:
    name: Build and Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.x
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - name: Install dependencies (skip post-install scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
      - run: pnpm test:unit
  
  staging-diagramly:
    needs: build
    environment:
      name: staging-diagramly
    runs-on: ubuntu-latest
    env:
      FORGE_EMAIL: "${{ vars.FORGE_EMAIL }}"
      FORGE_API_TOKEN: "${{ secrets.FORGE_API_TOKEN }}"
    steps:
      - uses: actions/checkout@v4
      - name: Build and publish
        uses: ./.github/actions/wrangler-publish
        with:
          node-version: '22.x'
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          license: lite
          project: conf-stg-lite
          environment: stg
      - name: Update manifest.yml to remove dashboard
        uses: mikefarah/yq@master
        with:
          cmd: yq eval 'del(.modules["confluence:globalSettings"]) | del(.modules["confluence:globalPage"])' -i manifest.yml
      - name: Update manifest.yml to remove embed macro
        uses: mikefarah/yq@master
        with:
          cmd: yq eval 'del(.modules.macro[] | select(.key | test("zenuml-embed-macro")))' -i manifest.yml
      - name: Deploy to Forge Staging
        run: |
          rm -rf dist/drawio
          pnpm forge:deploy:enable-analytics
          pnpm forge:deploy:diagramly:staging
      - name: Install to Zenuml Staging
        run: pnpm forge:install:diagramly:staging || pnpm forge:upgrade:diagramly:staging
        continue-on-error: true

  draft-release-diagramly:
    name: Draft release for the Diagramly version
    # don't run on pull requests to avoid creating draft releases for pull requests
    # only run on the master branch, to avoid cutting releases from feature branches
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/master' }}
    needs: [staging-diagramly]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
    steps:
      # Check out current repository
      - name: Fetch Sources
        uses: actions/checkout@v4

      - name: Export Properties
        id: properties
        shell: bash
        run: |
          VERSION="$(echo $(date +'%Y.%m.%d%H%M'))"
          echo "version=$VERSION" >> $GITHUB_ENV

      # Create new release draft - which is not publicly visible and requires manual acceptance
      - name: Create Release Draft
        id: createDraft
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: v${{ env.version }}-diagramly
          name: v${{ env.version }}-diagramly
          body: 'This is a draft release for the Diagramly version of the plugin.'
          draft: true
