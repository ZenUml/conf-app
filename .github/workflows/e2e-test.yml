name: E2E Test

on:
  workflow_call:
    inputs:
      app:
        type: string
        required: true
        description: 'App profile (e.g., zenuml-lite@stg)'
      suite:
        type: string
        default: 'all'
        description: 'Test suite: all, insert, render'
      artifact-suffix:
        type: string
        required: true
      node-version:
        type: string
        default: '24.x'
      username:
        type: string
        required: true
        description: 'Confluence username used by the Playwright auth bootstrap'
      password:
        type: string
        required: true
        description: 'Confluence password used by the Playwright auth bootstrap'
      otp:
        type: string
        required: true
        description: 'TOTP secret used by tests/e2e-tests/utils/otp.js'

# Spec-level parallelism via Playwright's `--shard=N/M`. Each shard is an
# independent GitHub Actions job: it does its own auth bootstrap (~30s) and
# runs ~half of the suite's specs in parallel with the other shard.
#
# Trade-off: 2× auth cost (~30s × 2 = 60s of duplicate work) vs. wall-clock
# savings of half the spec runtime. For the insert suite (~250s today),
# the longest shard finishes in ~150s — a ~40% wall-clock reduction.
#
# Why N=2: insert (the only suite running in CI today) has 9 tests, which
# Playwright shards as 4/4/1 across N=3 — the small shard pays full auth
# overhead for almost no work. N=2 splits cleanly to 5/4. If `suite=all`
# is ever enabled in CI (~23 tests), bump SHARD_COUNT to 3 below and add
# a third entry to strategy.matrix.shard.
env:
  SHARD_COUNT: 2

jobs:
  test:
    name: shard ${{ matrix.shard }}/2
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v5
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.x
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
      # tests/e2e-tests is a standalone package (not in pnpm-workspace.yaml)
      # with only @playwright/test, otpauth, and dotenv as dependencies. It does
      # not import any code from the main workspace, so installing the main
      # app's dependency tree here is dead weight (~60–90 s wall-clock per job).
      - name: Install E2E test dependencies
        run: cd tests/e2e-tests && pnpm install --ignore-workspace
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-pw-${{ hashFiles('tests/e2e-tests/pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: cd tests/e2e-tests && pnpm exec playwright install --with-deps chromium
      - name: Run tests
        run: |
          cd tests/e2e-tests
          # Build the project filter list per suite — same as the per-suite
          # pnpm scripts, but inlined so we can append `--shard=N/M` for
          # spec-level parallelism. Setup projects (auth, pages) run in every
          # shard (Playwright shards specs, not setup deps); their cost is the
          # price we pay for the parallelism.
          case "${{ inputs.suite }}" in
            insert)
              PROJECTS="--project=auth --project=insert"
              ;;
            render)
              PROJECTS="--project=auth --project=pages --project=render"
              ;;
            *)
              PROJECTS="--project=auth --project=pages --project=render --project=insert --project=syntax-validation"
              ;;
          esac
          pnpm exec playwright test --ignore-snapshots $PROJECTS \
            --shard=${{ matrix.shard }}/${{ env.SHARD_COUNT }}
        env:
          APP: ${{ inputs.app }}
          CI: true
          ZENUML_STAGE_USERNAME: ${{ inputs.username }}
          ZENUML_STAGE_PASSWORD: ${{ inputs.password }}
          ATLASSIAN_OTP: ${{ inputs.otp }}
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ inputs.artifact-suffix }}-shard-${{ matrix.shard }}
          path: ./tests/e2e-tests/playwright-report/
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ inputs.artifact-suffix }}-shard-${{ matrix.shard }}
          path: ./tests/e2e-tests/screenshots/
