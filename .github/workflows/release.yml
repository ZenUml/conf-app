# GitHub Actions Workflow created for handling the release process based on the draft release prepared
# with the Build workflow. Running the publishPlugin task requires the PUBLISH_TOKEN secret provided.

name: Release
on:
  release:
    types: [prereleased, released]

jobs:
  release:
    name: ${{ github.event.release.tag_name }} to production
#    environment:  # It will wait for approval if we add an environment
#      name: staging
    runs-on: ubuntu-latest
    env:
      FORGE_EMAIL: "${{ vars.FORGE_EMAIL }}"
      FORGE_API_TOKEN: "${{ secrets.FORGE_API_TOKEN }}"
    steps:
      # Check out current repository
      - name: Fetch Sources
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
      # Set environment variables
      - name: Export Properties
        id: properties
        shell: bash
        run: |
          # extract License from github.event.release.tag_name
          LICENSE=$(echo ${{ github.event.release.tag_name }} | cut -d'-' -f2)
          echo "::set-output name=license::$LICENSE"
          # Map diagramly to lite for Cloudflare project (diagramly uses conf-lite)
          if [ "$LICENSE" = "diagramly" ]; then
            echo "::set-output name=cf_project::lite"
          else
            echo "::set-output name=cf_project::$LICENSE"
          fi
      - name: Build and publish to Cloudflare
        uses: ./.github/actions/wrangler-publish
        with:
          node-version: '20.x'
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          license: ${{ steps.properties.outputs.license }}
          project: conf-${{ steps.properties.outputs.cf_project }}
          environment: prod
      - name: Remove contentBylineItem in manifest.yml
        if: ${{ steps.properties.outputs.license != 'diagramly' }}
        uses: mikefarah/yq@master
        with:
          cmd: yq eval 'del(.modules["confluence:contentBylineItem"])' -i manifest.yml
      - name: Remove globalSettings and globalPage for Diagramly
        if: ${{ steps.properties.outputs.license == 'diagramly' }}
        uses: mikefarah/yq@master
        with:
          cmd: yq eval 'del(.modules["confluence:globalSettings"]) | del(.modules["confluence:globalPage"])' -i manifest.yml
      - name: Remove embed macro for Diagramly
        if: ${{ steps.properties.outputs.license == 'diagramly' }}
        uses: mikefarah/yq@master
        with:
          cmd: yq eval 'del(.modules.macro[] | select(.key | test("zenuml-embed-macro")))' -i manifest.yml
      - name: Remove licensing for Lite
        if: ${{ steps.properties.outputs.license == 'lite' }}
        uses: mikefarah/yq@master
        with:
          cmd: yq eval 'del(.app.licensing)' -i manifest.yml
      - name: Upload final manifest
        uses: actions/upload-artifact@v4
        with:
          name: manifest-${{ steps.properties.outputs.license }}-prod
          path: manifest.yml
      - name: Deploy "ZenUML for Confluence" to Forge Production
        if: ${{ steps.properties.outputs.license == 'lite' }}
        run: |
          pnpm forge:deploy:enable-analytics
          pnpm forge:deploy:lite:prod
      - name: Deploy "Diagramly for Confluence" to Forge Production
        if: ${{ steps.properties.outputs.license == 'diagramly' }}
        run: |
          rm -rf dist/drawio
          pnpm forge:deploy:enable-analytics
          pnpm forge:deploy:diagramly:prod