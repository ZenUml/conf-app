name: Smoke Test in Production

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  prod-lite:
    name: Lite Smoke Test (Prod)
    uses: ./.github/workflows/e2e-test.yml
    with:
      app: zenuml-lite@prod
      suite: insert
      artifact-suffix: lite-prod-smoke
      username: ${{ vars.ZENUML_PROD_USERNAME }}
      password: ${{ vars.ZENUML_PROD_PASSWORD }}
      otp: ${{ vars.ATLASSIAN_OTP }}

  prod-full:
    needs: prod-lite
    name: Full Smoke Test (Prod)
    uses: ./.github/workflows/e2e-test.yml
    with:
      app: zenuml-full@prod
      suite: insert
      artifact-suffix: full-prod-smoke
      username: ${{ vars.ZENUML_PROD_USERNAME }}
      password: ${{ vars.ZENUML_PROD_PASSWORD }}
      otp: ${{ vars.ATLASSIAN_OTP }}

  prod-diagramly:
    needs: prod-full
    name: Diagramly Smoke Test (Prod)
    uses: ./.github/workflows/e2e-test.yml
    with:
      app: diagramly@prod
      suite: insert
      artifact-suffix: diagramly-prod-smoke
      username: ${{ vars.ZENUML_PROD_USERNAME }}
      password: ${{ vars.ZENUML_PROD_PASSWORD }}
      otp: ${{ vars.ATLASSIAN_OTP }}
