name: Staging Deploy

on:
  workflow_call:
    inputs:
      variant:
        required: true
        type: string
        description: 'lite, full, or diagramly'
      license:
        required: true
        type: string
        description: 'Build license passed to wrangler-publish'
      project:
        required: true
        type: string
        description: 'Cloudflare Pages project name'
      environment:
        required: true
        type: string
        description: 'GitHub environment name'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    env:
      FORGE_EMAIL: "${{ vars.FORGE_EMAIL }}"
      FORGE_API_TOKEN: "${{ secrets.FORGE_API_TOKEN }}"
    steps:
      - uses: actions/checkout@v4
      - name: Build and publish
        uses: ./.github/actions/wrangler-publish
        with:
          node-version: '22.x'
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          license: ${{ inputs.license }}
          project: ${{ inputs.project }}
          environment: stg

      # Lite: remove contentBylineItem and licensing
      - name: Remove contentBylineItem from manifest
        if: inputs.variant == 'lite'
        uses: mikefarah/yq@master
        with:
          cmd: yq eval 'del(.modules["confluence:contentBylineItem"])' -i manifest.yml
      - name: Remove licensing (Lite is free)
        if: inputs.variant == 'lite'
        uses: mikefarah/yq@master
        with:
          cmd: yq eval 'del(.app.licensing)' -i manifest.yml
      - name: Upload final manifest
        if: inputs.variant == 'lite'
        uses: actions/upload-artifact@v4
        with:
          name: manifest-lite-staging
          path: manifest.yml

      # Diagramly: remove dashboard and embed macro
      - name: Remove dashboard from manifest
        if: inputs.variant == 'diagramly'
        uses: mikefarah/yq@master
        with:
          cmd: yq eval 'del(.modules["confluence:globalSettings"]) | del(.modules["confluence:globalPage"])' -i manifest.yml
      - name: Remove embed macro from manifest
        if: inputs.variant == 'diagramly'
        uses: mikefarah/yq@master
        with:
          cmd: yq eval 'del(.modules.macro[] | select(.key | test("zenuml-embed-macro")))' -i manifest.yml

      # Forge deploy (lite and diagramly)
      - name: Deploy to Forge Staging
        if: inputs.variant != 'full'
        run: |
          pnpm forge:deploy:enable-analytics
          pnpm forge:deploy:${{ inputs.variant }}:staging
      - name: Install Lite to Zenuml Staging
        if: inputs.variant == 'lite'
        run: |
          pnpm forge:install:lite:staging
          pnpm forge:upgrade:lite:staging
        continue-on-error: true
      - name: Install Diagramly to Zenuml Staging
        if: inputs.variant == 'diagramly'
        run: pnpm forge:install:diagramly:staging || pnpm forge:upgrade:diagramly:staging
        continue-on-error: true

      # Full: pluploader deploy
      - uses: actions/setup-python@v5
        if: inputs.variant == 'full'
        with:
          python-version: '3.10'
      - name: Install PyYAML
        if: inputs.variant == 'full'
        run: pip3 install PyYAML==5.3.1
      - name: Install pluploader
        if: inputs.variant == 'full'
        run: pip3 install pluploader
      - name: Install plugin to Confluence
        if: inputs.variant == 'full'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            pluploader --base-url https://zenuml-stg.atlassian.net/wiki \
              --user ${{ secrets.ZENUML_STAGE_UPM_USER }} \
              --password ${{ secrets.ZENUML_STAGE_UPM_PASSWORD }} \
              install --cloud \
              --plugin-uri https://${{ inputs.project }}.zenuml.com/descriptor
