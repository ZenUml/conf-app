name: Sync E2E Tests

on:
  push:
    branches: [master]
    paths: ['tests/e2e-tests/**']

jobs:
  sync:
    name: Sync to conf-app-e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Push changes to public repo
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_DISPATCH_TOKEN }}
        run: |
          git clone https://x-access-token:$GH_TOKEN@github.com/ZenUml/conf-app-e2e.git /tmp/e2e
          rsync -av --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.github' \
            --exclude='auth-state*.json' \
            --exclude='.env' \
            tests/e2e-tests/ /tmp/e2e/
          cd /tmp/e2e
          git config user.email "ci@zenuml.com"
          git config user.name "ZenUml CI"
          git add -A
          git diff --cached --quiet && echo "No changes to sync" && exit 0
          git commit -m "sync: e2e tests from ${{ github.sha }}"
          git push
