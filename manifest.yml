environment:
  variables:
    - APP_ID
    - BASE_URL

app:
  id: ari:cloud:ecosystem::app/${APP_ID}
  connect:
    key: com.zenuml.confluence-addon
    remote: connect
    # authentication: jwt
  runtime:
    name: nodejs20.x
  licensing:
    enabled: true
remotes:
# Addition of one or more new remotes, see https://developer.atlassian.com/platform/adopting-forge-from-connect/connect-forge-updates-preview/
  - key: connect
    baseUrl: ${BASE_URL}
    operations:
        - compute
    auth:
      appSystemToken:
        enabled: true
      appUserToken:
        enabled: true
# connectModules:
#   confluence:lifecycle:
#     - key: lifecycle-events
#       installed: /installed?version=2025.04
#       uninstalled: /uninstalled?version=2025.04
permissions:
  scopes:
  # "Addition of Forge-specific OAuth 2.0 scopes that inherit permissions already granted by a Connect scope the customer has already accepted" doesn't require admin approval only the first time, see https://developer.atlassian.com/platform/adopting-forge-from-connect/connect-forge-updates-preview/. To avoid admin approval in future, all the scopes that are already granted by Connect Read and Write scopes are added here.
    - read:connect-confluence
    - write:connect-confluence
    - read:confluence-content.summary
    - write:confluence-content
    - read:confluence-content.all
    - write:confluence-file
    - read:confluence-content.permission
    - search:confluence
    - manage:confluence-configuration
    - read:confluence-groups
    - read:confluence-props
    - read:confluence-space.summary
    - read:confluence-user
    - readonly:content.attachment:confluence
    - write:confluence-props
    - read:page:confluence
    - read:content:confluence
    - read:content-details:confluence
    - read:space:confluence
    - read:custom-content:confluence
    - write:custom-content:confluence
    - write:attachment:confluence
    - write:app-data:confluence
    - write:comment:confluence
    - write:configuration:confluence
    - write:content.property:confluence
    - write:content.restriction:confluence
    - write:content:confluence
    - write:database:confluence
    - write:embed:confluence
    - write:folder:confluence
    - write:inlinetask:confluence
    - write:label:confluence
    - write:page:confluence
    - write:relation:confluence
    - write:space.permission:confluence
    - write:space.property:confluence
    - write:space.setting:confluence
    - write:space:confluence
    - write:task:confluence
    - write:user.property:confluence
    - write:watcher:confluence
    - write:whiteboard:confluence
    - read:analytics.content:confluence
    - read:app-data:confluence
    - read:attachment:confluence
    - read:audit-log:confluence
    - read:comment:confluence
    - read:configuration:confluence
    - read:content.metadata:confluence
    - read:content.permission:confluence
    - read:content.property:confluence
    - read:content.restriction:confluence
    - read:content:confluence
    - read:custom-content:confluence
    - read:database:confluence
    - read:email-address:confluence
    - read:embed:confluence
    - read:folder:confluence
    - read:group:confluence
    - read:hierarchical-content:confluence
    - read:inlinetask:confluence
    - read:label:confluence
    - read:page:confluence
    - read:relation:confluence
    - read:space-details:confluence
    - read:space.permission:confluence
    - read:space.property:confluence
    - read:space.setting:confluence
    - read:space:confluence
    - read:task:confluence
    - read:template:confluence
    - read:user.property:confluence
    - read:user:confluence
    - read:watcher:confluence
    - read:whiteboard:confluence
    - read:app-user-token
    - read:app-system-token
  external:
  # "Modifying content permissions CSP options, external permissions CSP options and URLs, or
  # fetch permissions options and URLs" does not require admin approval.
    fetch:
      backend:
        - https://zenuml.com
        - https://*.zenuml.com
      client:
        - https://zenuml.com
        - https://*.zenuml.com
        - https://www.google-analytics.com
    frames:
      - https://conf-full.zenuml.com/drawio/index.html
    scripts:
      - https://conf-full.zenuml.com/drawio/js/sanitizer/purify.min.js
      - https://conf-full.zenuml.com/drawio/mxgraph/mxClient.js
      - https://conf-full.zenuml.com/drawio/js/grapheditor/Init.js
      - https://conf-full.zenuml.com/drawio/js/grapheditor/Graph.js
      - https://conf-full.zenuml.com/drawio/js/grapheditor/Shapes.js
      - https://www.googletagmanager.com/gtag/js
      - https://www.google-analytics.com/analytics.js
      - https://cdn.mxpnl.com/libs/mixpanel-2-latest.min.js
  content:
    styles:
      - unsafe-inline

modules:
  macro:
    - key: zenuml-sequence-macro
      title: Diagram (ZenUML & Mermaid)
      description: Create a ZenUML or Mermaid Diagram. Developed by the ZenUML team.
      resource: main
      config:
        resource: main
        viewportSize: max
      adfExport:
        function: exportMacro
      resolver:
        endpoint: remote-connect
    - key: zenuml-openapi-macro
      title: OpenAPI / Swagger
      description: Create an OpenAPI / Swagger Spec. Developed by the ZenUML team.
      resource: main
      config:
        resource: main
        viewportSize: max
      adfExport:
        function: exportMacro
      resolver:
        endpoint: remote-connect
    - key: zenuml-graph-macro
      title: Graph (DrawIO)
      description: Create a Graph powered by DrawIO. Developed by the ZenUML team.
      resource: main
      config:
        resource: main
        viewportSize: max
      adfExport:
        function: exportMacro
      resolver:
        endpoint: remote-connect
    - key: zenuml-embed-macro
      title: Embed a Diagram, Graph or API Spec
      description: Embed an existing Diagram, Graph or API Spec. Developed by the ZenUML team.
      resource: main
      config:
        resource: main
        viewportSize: max
      adfExport:
        function: exportMacro
      resolver:
        endpoint: remote-connect
  trigger:
    - key: remote-installed-trigger
      endpoint: remote-installed-endpoint
      events:
        - avi:forge:installed:app
        - avi:forge:upgraded:app
  endpoint:
    - key: remote-connect
      remote: connect
      auth:
        appUserToken:
          enabled: true
        appSystemToken:
          enabled: true 
    - key: remote-installed-endpoint
      remote: connect
      route:
        path: /forge-installed
      auth:
        appSystemToken:
          enabled: true
  confluence:globalSettings:
    - key: zenuml-get-started-settings
      title: Get Started
      resource: main
      useAsGetStarted: true
  confluence:customContent:
    - key: zenuml-content-sequence
      supportedContainerTypes:
        - space
        - page
        - blogpost
      supportedChildTypes:
        - attachment
        - comment
      title: ZenUML
      resource: main
      bodyType: raw
      migratedFromConnect: true
    - key: zenuml-content-graph
      supportedContainerTypes:
        - space
        - page
        - blogpost
      supportedChildTypes:
        - attachment
        - comment
      title: ZenUML Graph
      resource: main
      bodyType: raw
      migratedFromConnect: true
  function:
    - key: exportMacro
      handler: export.handler

resources:
  - key: main
    path: dist/
    tunnel:
      port: 8080
