permissions:
  scopes:
    - read:connect-confluence
    - write:connect-confluence
    - read:confluence-content.summary
    - write:confluence-content
    - read:confluence-content.all
    - write:confluence-file
    - read:confluence-content.permission
    - search:confluence
    - read:page:confluence
    - read:content:confluence
    - read:content-details:confluence
    - read:space:confluence
    - read:custom-content:confluence
    - write:custom-content:confluence
  external:
    fetch:
      backend:
        - https://*.zenuml.com
        - https://confluence-plugin.pages.dev
      client:
        - https://*.zenuml.com
        - https://confluence-plugin.pages.dev
    images:
      - https://confluence-plugin.pages.dev/api/features
      - https://confluence-plugin.pages.dev/api/metrics/evaluation
      - https://confluence-plugin.pages.dev/track
    frames:
      - https://confluence-plugin.pages.dev/drawio/index.html    
    scripts:
      - https://confluence-plugin.pages.dev/drawio/js/sanitizer/purify.min.js
      - https://confluence-plugin.pages.dev/drawio/mxgraph/mxClient.js
      - https://confluence-plugin.pages.dev/drawio/js/grapheditor/Init.js
      - https://confluence-plugin.pages.dev/drawio/js/grapheditor/Graph.js
      - https://confluence-plugin.pages.dev/drawio/js/grapheditor/Shapes.js
  content:
    styles:
      - unsafe-inline

modules:
  macro:
    - key: zenuml-sequence-macro
      title: ZenUML Forge Sequence Diagram
      description: Create and view ZenUML or Mermaid diagrams.
      resource: main
      config:
        resource: main
        viewportSize: max
    - key: zenuml-openapi-macro
      title: ZenUML Forge OpenAPI Diagram
      description: Create and view OpenAPI / Swagger diagrams.
      resource: main
      config:
        resource: main
        viewportSize: max
    - key: zenuml-graph-macro
      title: ZenUML Forge Graph Diagram
      description: Create and view DrawIO-powered graph diagrams.
      resource: main
      config:
        resource: main
        viewportSize: max
    - key: zenuml-embed-macro
      title: ZenUML Forge Embed Diagram
      description: Embed an existing Diagram, Graph or API Spec.
      resource: main
      config:
        resource: main
        viewportSize: max
  # confluence:globalPage:
  #   - key: zenuml-content-sequence-viewer
  #     title: ZenUML Sequence Viewer
  #     resource: main
  #     route: zenuml-content-sequence-viewer
  confluence:customContent:
    - key: zenuml-content-sequence
      supportedContainerTypes:
        - space
        - page
        - blogpost
      supportedChildTypes:
        - attachment
        - comment
      title: ZenUML Content
      resource: main
      migratedFromConnect: true

resources:
  - key: main
    path: dist/
    tunnel:
      port: 8080
