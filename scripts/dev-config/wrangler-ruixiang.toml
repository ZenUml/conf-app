compatibility_flags = [ "nodejs_compat" ]
compatibility_date = "2024-11-11"

name="confluence-plugin"
pages_build_output_dir = "dist"

[vars]
DIAGRAMLY_BACKEND_API_BASE_URL = "https://staging.diagramly.ai"
ENVIRONMENT = "development"  # Set to "development" for local development

[env.production]
ENVIRONMENT = "production"

[[ env.preview.d1_databases ]]
binding = "DB"
database_name = "confluence-plugin"
database_id = "9ddbb9d0-d4f6-4bba-8b15-9809766db816"
migrations_dir = "functions/migrations"

[[ env.production.d1_databases ]]
binding = "DB"
database_name = "confluence-plugin"
database_id = "9ddbb9d0-d4f6-4bba-8b15-9809766db816"
migrations_dir = "functions/migrations"

[[ d1_databases ]]
binding = "DB"
database_name = "confluence-plugin"
