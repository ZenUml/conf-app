<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Global site tag (gtag.js) - Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=UA-114996686-1"></script>
  <script type="text/javascript" src="js/google-analytics.js?version=2022.01"></script>
  <title>confluence-plugin-view</title>

  <meta charset="utf-8">
  <script type="text/javascript" src="js/util.js"></script>
  <script type="text/javascript" src="js/dom-to-image.min.js?version=2022.02"></script>
  <script type="text/javascript" src="js/md5.js"></script>
  <script type="text/javascript" src="https://connect-cdn.atl-paas.net/all.js"></script>

  <script id="connect-loader"></script>

  <style>
    *::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    *::-webkit-scrollbar-thumb {
      background-color: #D0D5DD;
      border-radius: 6px;
    }

    *::-webkit-scrollbar-track {
      background-color: #fff;
    }

    /* Loading skeleton styles */
    .skeleton-loader {
      width: 100%;
      height: 400px;
      background: #f6f7f9;
      position: relative;
      overflow: hidden;
      border-radius: 4px;
    }

    .skeleton-loader::after {
      content: "";
      display: block;
      position: absolute;
      top: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
      animation: loading 1.5s infinite;
    }

    .skeleton-header {
      height: 40px;
      margin-bottom: 20px;
      background: #e9ecef;
      border-radius: 4px;
    }

    .skeleton-line {
      height: 20px;
      margin-bottom: 10px;
      background: #e9ecef;
      border-radius: 4px;
      width: 80%;
    }

    .skeleton-line:nth-child(2) {
      width: 90%;
    }

    .skeleton-line:nth-child(3) {
      width: 70%;
    }

    @keyframes loading {
      0% {
        transform: translateX(-100%);
      }
      100% {
        transform: translateX(100%);
      }
    }
  </style>
</head>
<body>
<div class="mx-auto" style="width: 100%">
  <div id="app">
    <!-- Skeleton loader will be shown until the app is fully loaded -->
    <div id="skeleton-loader" class="skeleton-loader">
      <div class="skeleton-header"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
    </div>
  </div>
</div>
</body>
<script type="module" src="src/sequence-viewer.ts"></script>

</html>
