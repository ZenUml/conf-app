compatibility_flags = [ "nodejs_compat" ]
compatibility_date = "2024-11-11"

name="confluence-plugin"
pages_build_output_dir = "dist"

[vars]
DIAGRAMLY_BACKEND_API_BASE_URL = "https://staging.diagramly.ai"
ENVIRONMENT = "development"  # Set to "development" for local development
PAGE_CAPTURE_ALLOWED_DOMAINS = "whimet4"

[env.production]
ENVIRONMENT = "production"

[env.production.vars]
PAGE_CAPTURE_ALLOWED_DOMAINS = "whimet4"

[[ env.preview.d1_databases ]]
binding = "DB"
database_name = "conf-zenuml-dev"
database_id = "f0587475-61db-42c1-bc23-f665df96d932"
migrations_dir = "functions/migrations"

[[ env.production.d1_databases ]]
binding = "DB"
database_name = "conf-zenuml-dev"
database_id = "f0587475-61db-42c1-bc23-f665df96d932"
migrations_dir = "functions/migrations"

[[ d1_databases ]]
binding = "DB"
database_name = "conf-zenuml-dev"
database_id = "f0587475-61db-42c1-bc23-f665df96d932"
migrations_dir = "functions/migrations"

[[ env.production.r2_buckets ]]
binding = "EVENT_BUCKET"
bucket_name = "atlassian-events"

# for local development
[[r2_buckets]]
binding = "EVENT_BUCKET"
bucket_name = "atlassian-events"

# Feature flags KV namespace
[[kv_namespaces]]
binding = "confluence_plugin_features"
id = "86916df556884c049e5d2040136b6bd0"

[[env.production.kv_namespaces]]
binding = "confluence_plugin_features"
id = "9531a58d3f5b47a6af77750240c09548"

[[env.production.kv_namespaces]]
binding = "SPACE_LICENSE_KV"
id = "e56fcb64cca74e10aac68e1d57b6c05b"

# Local development KV binding
[[kv_namespaces]]
binding = "SPACE_LICENSE_KV"
id = "e56fcb64cca74e10aac68e1d57b6c05b"

# Portal feature flags KV (shared with zenuml-portal staging)
[[kv_namespaces]]
binding = "KV_FEATURE_FLAGS"
id = "fd87eed34f864190880a4b44d25c0e91"

[[env.production.kv_namespaces]]
binding = "KV_FEATURE_FLAGS"
id = "fe9042cb20994651b0a2ef9e68f9037c"

[ai]
binding = "AI"
