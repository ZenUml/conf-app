compatibility_flags = [ "nodejs_compat" ]
compatibility_date = "2024-11-11"

name="conf-prod"
pages_build_output_dir = "dist"

[vars]
DIAGRAMLY_BACKEND_API_BASE_URL = "https://diagramly.ai"

[env.production]
ENVIRONMENT = "production"

[[ env.production.d1_databases ]]
binding = "DB"
database_name = "conf-zenuml-prod"
database_id = "2e34f32e-5ddd-40dc-9e3d-019f9b1d431f"
migrations_dir = "functions/migrations"

[[ env.production.kv_namespaces ]]
binding = "CLIENT_INSTALLATION_KV"
id = "ae1a9199a02e4f75b1cad07f0016aae0"

[[ env.production.r2_buckets ]]
binding = "EVENT_BUCKET"
bucket_name = "atlassian-events"

[[env.production.kv_namespaces]]
binding = "confluence_plugin_features"
id = "9531a58d3f5b47a6af77750240c09548"
