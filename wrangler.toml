[[ env.production.d1_databases ]]
binding = "DB"
database_name = "conf-stg-lite"
database_id = "789f7a84-7b7a-4e03-9983-b5fa50c172f9"
migrations_dir = "functions/migrations"

[[ d1_databases ]]
binding = "DB"
